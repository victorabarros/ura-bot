<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>UraBot ☢️</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:     #080808;
      --text:   #e2e8f0;
      --muted:  #64748b;
      --green:  #a3e635;
    }

    html, body {
      min-height: 100vh;
      background: var(--bg);
      color: var(--text);
      font-family: "Inter", "Segoe UI", system-ui, sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 48px 16px 32px;
    }

    .page {
      width: 100%;
      max-width: 520px;
      display: flex;
      flex-direction: column;
      gap: 32px;
    }

    /* ── Hero ── */
    .hero { text-align: center; }

    .hero-icon { font-size: 3rem; line-height: 1; margin-bottom: 12px; display: block; }

    .hero h1 {
      font-size: 2rem;
      font-weight: 700;
      letter-spacing: -0.03em;
    }

    .hero p {
      margin-top: 8px;
      color: var(--muted);
      font-size: 0.95rem;
      line-height: 1.6;
    }

    .hero-link {
      display: inline-block;
      margin-top: 16px;
      color: var(--green);
      text-decoration: none;
      font-size: 0.875rem;
      font-weight: 500;
      border: 1px solid var(--green);
      border-radius: 999px;
      padding: 6px 16px;
      transition: background 0.15s, color 0.15s;
    }
    .hero-link:hover { background: var(--green); color: var(--bg); }

    /* ── Tweet container ── */
    #tweet-container { display: flex; justify-content: center; min-height: 100px; }

    .state-message {
      color: var(--muted);
      font-size: 0.9rem;
      padding: 40px 0;
      text-align: center;
      width: 100%;
    }

    .error-text { color: #f87171; }

    /* ── Footer ── */
    .page-footer {
      text-align: center;
      font-size: 0.75rem;
      color: var(--muted);
      line-height: 1.8;
    }
  </style>
</head>
<body>
  <div class="page">

    <header class="hero">
      <span class="hero-icon">☢️</span>
      <h1>UraBot</h1>
      <p>A bot that tracks and broadcasts uranium market quotes to X and beyond.</p>
      <a class="hero-link" id="profile-link" href="https://x.com" target="_blank" rel="noopener">
        Follow on X →
      </a>
    </header>

    <div id="tweet-container">
      <p class="state-message" id="status-msg">Loading latest post…</p>
    </div>

    <footer class="page-footer" id="footer"></footer>

  </div>

  <script async src="https://platform.x.com/widgets.js" charset="utf-8"></script>

  <script>
    const ENDPOINT    = "/urabot/latest-post"
    const REFRESH_MS  = 5 * 60 * 1000
    const container   = document.getElementById("tweet-container")
    const statusMsg   = document.getElementById("status-msg")
    const footer      = document.getElementById("footer")
    const profileLink = document.getElementById("profile-link")

    function formatDate(iso) {
      try {
        return new Date(iso).toLocaleString("en-US", {
          month: "short", day: "numeric", year: "numeric",
          hour: "2-digit", minute: "2-digit",
        })
      } catch { return iso }
    }

    async function refresh() {
      try {
        const res = await fetch(ENDPOINT)
        if (!res.ok) throw new Error(`HTTP ${res.status}`)
        const post = await res.json()

        const handle = post.url.match(/x\.com\/([^/]+)\//)?.[1] ?? "UraniumStockBot"
        profileLink.href = `https://x.com/${handle}`
        profileLink.textContent = `@${handle} on X →`

        container.innerHTML = `
          <blockquote class="twitter-tweet" data-theme="dark" data-conversation="none">
            <a href="${post.url.replace(/"/g, "&quot;")}"></a>
          </blockquote>
        `

        if (window.twttr?.widgets) {
          window.twttr.widgets.load(container)
        }

        footer.textContent = `Last updated: ${formatDate(new Date().toISOString())} · Refreshes every 5 minutes`
      } catch (err) {
        container.innerHTML = `<p class="state-message error-text">Could not load latest post. Retrying…</p>`
        footer.textContent = `Failed to refresh · ${formatDate(new Date().toISOString())}`
      }
    }

    refresh()
    setInterval(refresh, REFRESH_MS)
  </script>
</body>
</html>
